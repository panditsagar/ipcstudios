<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Transform Your Marriage</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Landing Page Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Custom Thank You Page Overrides -->
    <style>
        .thankyou-section {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
        }
        .thankyou-box {
            background-color: #1a1600;
            border: 1px solid rgba(255, 193, 7, 0.4);
            border-radius: 16px;
            padding: 2rem 2rem;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .success-icon {
            font-size: 4.5rem;
            color: #22c55e; /* Vibrant Green */
            margin-bottom: 1.5rem;
            text-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
        }
        .thankyou-title {
            font-size: 3.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .thankyou-subtitle {
            font-size: 1.25rem;
            color: #e5e5e5;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 600px;
        }
 
   
        .wa-btn {
            background: #25D366; /* Official WhatsApp Green */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.25);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            width: auto;
        }
        .wa-btn:hover {
            background: #1ebc53;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.3);
        }
        
        @media (max-width: 768px) {
            
            .thankyou-box {
                padding: 3rem 2rem;
            }
            .next-steps {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .thankyou-section {
                padding: 1rem 1.5rem;
             }
            .thankyou-box {
                padding: 2.5rem 1.5rem;
            }
            .thankyou-title {
                font-size: 2rem;
            }
            .success-icon {
                font-size: 4rem;
                margin-bottom: 1rem;
            }
            .thankyou-subtitle {
                font-size: 1rem;
                line-height: 1.3;
                margin-bottom: 2rem;
            }
            .next-steps h3 {
                font-size: 1.2rem;
            }
            .step-list li {
                font-size: 1rem;
                line-height: 1.4;
            }
            .step-number {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }
            .wa-btn {
                width: 100%;
                font-size: 1.1rem;
                padding: 1.2rem 1rem;
            }
        }
    </style>
</head>
<body style="padding-bottom: 0;"> <!-- overriding the 80px bottom sticky padding -->

    <section class="thankyou-section">
        <div class="thankyou-box">
            <!-- Large Success Checkmark -->
            <i class="fa-solid fa-circle-check success-icon"></i>
            
            <h1 class="thankyou-title">You're In! <span class="highlight">Seat Confirmed.</span></h1>
            
            <p class="thankyou-subtitle">
                Congratulations on taking the first step towards taking control of your life and transforming your marriage.<br>Your registration was completely successful.
            </p>

          

            <!-- WhatsApp Action Button -->
            <!-- Add actual group invite link into href -->
            <a href="https://chat.whatsapp.com" class="wa-btn" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.5rem;"></i> Join VIP WhatsApp Group
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-copyright" style="border-top: none;">
            <div class="container">
                <p>&copy; 2026 Mrunali Manish. Transform Your Marriage. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>
</html>
